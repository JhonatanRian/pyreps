name: Bug Report
description: Report a bug to help us improve pyreps
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please provide as much detail as possible.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide a minimal code example or steps to reproduce the behavior.
      placeholder: |
        ```python
        from pyreps import generate_report
        # your code here
        ```
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, pyreps version
      placeholder: e.g., Python 3.12, Linux, v0.2.0
    validations:
      required: true
