name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv and set up Python
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
        
      - name: Install dependencies
        run: uv sync --all-extras --dev
        
      - name: Run tests
        run: uv run pytest --cov=src --cov-report=xml --ignore=tests/test_memory_stability.py
        
      - name: Run Memory Stability Tests
        run: uv run pytest -m memory tests/test_memory_stability.py
        
      - name: Run Performance Benchmark
        run: uv run python scripts/benchmark_memory.py
        
      - name: Upload Memory Report
        uses: actions/upload-artifact@v4
        with:
          name: memory-report-${{ matrix.python-version }}
          path: memory_report.md
        
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Check formatting (ruff)
        run: uvx ruff format --check .
      - name: Lint (ruff)
        run: uvx ruff check .
      - name: Type check (pyright)
        run: uvx pyright src
